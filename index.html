<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Moovers — Cold Chain Logistics</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#070f09;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:0}
  select,input,textarea{-webkit-appearance:none;appearance:none}
  button{-webkit-tap-highlight-color:transparent;font-family:'DM Sans',sans-serif}
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.45}}
  @keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
  @keyframes truckMove{0%{left:18%}100%{left:72%}}
  @keyframes tempPulse{0%,100%{box-shadow:0 0 0 0 rgba(61,186,102,0.35)}50%{box-shadow:0 0 0 8px rgba(61,186,102,0)}}
  @keyframes routeDash{to{stroke-dashoffset:-30}}
  @keyframes spinSlow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
  @keyframes scaleIn{from{opacity:0;transform:scale(0.88)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;

// ─── Design Tokens ───────────────────────────────────────────────
const T={
  bg:'#070f09',bgS:'#0b1810',
  card:'#0e1f12',cardHov:'#122617',cardLight:'#162d1c',
  green:'#1b5e30',greenM:'#27834a',greenB:'#3dba66',greenA:'#62e88c',
  gold:'#c9a84c',goldL:'#e8c96b',
  charcoal:'#1a2d1e',
  text:'#eaf5ee',textM:'#7aad8a',textD:'#3e6b4c',
  border:'#1c3825',borderL:'#254d30',
  white:'#fff',
  red:'#e05555',
};

// ─── SVG Logo (Twin-O) ──────────────────────────────────────────
const Logo=({size=40,light=false})=>{
  const r=size/2,g=r*0.2,W=r*4+g,H=r*2;
  const fill=light?T.white:T.greenB;
  const hole=light?'rgba(255,255,255,0.15)':T.bg;
  return(
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} fill="none">
      <circle cx={r} cy={r} r={r} fill={fill}/>
      <circle cx={r} cy={r} r={r*0.42} fill={hole}/>
      <circle cx={r*3+g} cy={r} r={r} fill={fill}/>
      <circle cx={r*3+g} cy={r} r={r*0.42} fill={hole}/>
    </svg>
  );
};

// ─── Truck SVG ──────────────────────────────────────────────────
const TruckIcon=({size=32,color=T.greenB})=>(
  <svg width={size} height={size*0.65} viewBox="0 0 48 32" fill="none">
    <rect x="0" y="6" width="34" height="20" rx="3" fill={color} opacity="0.9"/>
    <rect x="2" y="9" width="8" height="12" rx="1" fill={T.bg} opacity="0.35"/>
    <path d="M34 10 L34 26 L48 26 L48 16 L42 10 Z" fill={color}/>
    <circle cx="9" cy="28" r="4" fill={T.bg}/>
    <circle cx="9" cy="28" r="2" fill={color}/>
    <circle cx="39" cy="28" r="4" fill={T.bg}/>
    <circle cx="39" cy="28" r="2" fill={color}/>
    <rect x="36" y="14" width="8" height="7" rx="1" fill={T.bg} opacity="0.3"/>
    <rect x="4" y="11" width="16" height="1.5" rx="0.75" fill={T.greenA} opacity="0.5"/>
    <rect x="4" y="14.5" width="12" height="1.5" rx="0.75" fill={T.greenA} opacity="0.5"/>
  </svg>
);

// ─── Warehouse Icon ─────────────────────────────────────────────
const WarehouseIcon=({size=28})=>(
  <svg width={size} height={size} viewBox="0 0 28 28" fill="none">
    <polygon points="14,2 26,10 26,26 2,26 2,10" fill={T.goldL} opacity="0.85"/>
    <rect x="11" y="15" width="6" height="11" rx="1" fill={T.bg} opacity="0.5"/>
    <rect x="4" y="14" width="5" height="4" rx="0.5" fill={T.bg} opacity="0.4"/>
    <rect x="19" y="14" width="5" height="4" rx="0.5" fill={T.bg} opacity="0.4"/>
  </svg>
);

// ─── Store Icon ─────────────────────────────────────────────────
const StoreIcon=({size=28})=>(
  <svg width={size} height={size} viewBox="0 0 28 28" fill="none">
    <rect x="3" y="11" width="22" height="15" rx="1.5" fill={T.greenA} opacity="0.85"/>
    <rect x="4" y="8" width="20" height="5" rx="1" fill={T.greenM} opacity="0.7"/>
    <rect x="11" y="16" width="6" height="10" rx="1" fill={T.bg} opacity="0.5"/>
    <rect x="5" y="14" width="4" height="4" rx="0.5" fill={T.bg} opacity="0.4"/>
    <rect x="19" y="14" width="4" height="4" rx="0.5" fill={T.bg} opacity="0.4"/>
    <path d="M8 8 L14 3 L20 8" fill={T.goldL} opacity="0.9"/>
  </svg>
);

// ─── Shared UI ──────────────────────────────────────────────────
const Btn=({children,onClick,variant='primary',style={},disabled=false,small=false})=>{
  const base={
    border:'none',borderRadius:10,cursor:disabled?'not-allowed':'pointer',
    fontFamily:'DM Sans,sans-serif',fontWeight:600,letterSpacing:0.3,
    transition:'all 0.18s',width:'100%',opacity:disabled?0.4:1,
    padding:small?'9px 16px':'13px 20px',fontSize:small?12:14,
  };
  const v={
    primary:{background:T.greenB,color:T.bg},
    secondary:{background:'transparent',color:T.greenA,border:`1.5px solid ${T.greenB}55`},
    ghost:{background:T.card,color:T.textM,border:`1px solid ${T.border}`},
    gold:{background:`linear-gradient(135deg,${T.gold},${T.goldL})`,color:T.bg},
  };
  return<button onClick={disabled?undefined:onClick} style={{...base,...v[variant],...style}}>{children}</button>;
};

const Field=({label,children,style={}})=>(
  <div style={{marginBottom:14,...style}}>
    <div style={{color:T.textD,fontSize:9,fontWeight:600,letterSpacing:1.8,marginBottom:6}}>{label}</div>
    {children}
  </div>
);

const inputSt={
  width:'100%',background:T.cardLight,border:`1px solid ${T.border}`,
  borderRadius:10,padding:'12px 14px',color:T.text,fontSize:13,
  fontFamily:'DM Sans,sans-serif',outline:'none',
};

const Tag=({children,color=T.greenB,small=false})=>(
  <span style={{
    background:color+'22',color:color,border:`1px solid ${color}44`,
    borderRadius:6,padding:small?'2px 7px':'3px 10px',
    fontSize:small?9:10,fontWeight:600,letterSpacing:0.8,display:'inline-block',
  }}>{children}</span>
);

const Divider=()=><div style={{height:1,background:T.border,margin:'12px 0'}}/>;

// ─── Status Bar ─────────────────────────────────────────────────
const StatusBar=()=>(
  <div style={{display:'flex',justifyContent:'space-between',padding:'12px 22px 6px',flexShrink:0}}>
    <span style={{fontSize:11,color:T.textM,fontWeight:600}}>9:41</span>
    <span style={{fontSize:11,color:T.textM}}>●●●  WiFi  ▮▮▮</span>
  </div>
);

// ─── Bottom Nav ─────────────────────────────────────────────────
const BottomNav=({screen,setScreen})=>{
  const tabs=[
    {id:'home',label:'Home',icon:HomeIcon},
    {id:'book',label:'Book',icon:BookIcon},
    {id:'track',label:'Track',icon:TrackIcon},
    {id:'history',label:'History',icon:HistoryIcon},
  ];
  return(
    <div style={{display:'flex',borderTop:`1px solid ${T.border}`,background:T.bgS,padding:'10px 0 22px',flexShrink:0}}>
      {tabs.map(t=>{
        const active=screen===t.id;
        return(
          <button key={t.id} onClick={()=>setScreen(t.id)} style={{
            flex:1,background:'none',border:'none',cursor:'pointer',
            display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'4px 0',
          }}>
            <t.icon size={20} color={active?T.greenB:T.textD}/>
            <span style={{fontSize:9,fontWeight:600,letterSpacing:0.8,color:active?T.greenA:T.textD}}>{t.label}</span>
            {active&&<div style={{width:4,height:4,borderRadius:'50%',background:T.greenB,marginTop:1}}/>}
          </button>
        );
      })}
    </div>
  );
};

// Nav icons
const HomeIcon=({size,color})=>(
  <svg width={size} height={size} viewBox="0 0 20 20" fill="none">
    <path d="M3 9.5L10 3l7 6.5V17a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" stroke={color} strokeWidth="1.5" fill="none"/>
    <rect x="7" y="11" width="6" height="7" rx="0.5" stroke={color} strokeWidth="1.5" fill="none"/>
  </svg>
);
const BookIcon=({size,color})=>(
  <svg width={size} height={size} viewBox="0 0 20 20" fill="none">
    <rect x="3" y="3" width="14" height="14" rx="2.5" stroke={color} strokeWidth="1.5" fill="none"/>
    <path d="M7 10h6M7 7h6M7 13h3" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
    <circle cx="15" cy="15" r="4" fill={color}/>
    <path d="M13.5 15h3M15 13.5v3" stroke={T.bg} strokeWidth="1.5" strokeLinecap="round"/>
  </svg>
);
const TrackIcon=({size,color})=>(
  <svg width={size} height={size} viewBox="0 0 20 20" fill="none">
    <circle cx="10" cy="10" r="7" stroke={color} strokeWidth="1.5" fill="none"/>
    <circle cx="10" cy="10" r="2.5" fill={color}/>
    <path d="M10 3v2M10 15v2M3 10h2M15 10h2" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
  </svg>
);
const HistoryIcon=({size,color})=>(
  <svg width={size} height={size} viewBox="0 0 20 20" fill="none">
    <path d="M3 9a7 7 0 107 -7" stroke={color} strokeWidth="1.5" strokeLinecap="round" fill="none"/>
    <path d="M3 5v4h4" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
    <path d="M10 7v4l2.5 2" stroke={color} strokeWidth="1.5" strokeLinecap="round" fill="none"/>
  </svg>
);

// ─── SPLASH SCREEN ───────────────────────────────────────────────
const Splash=({onEnter})=>{
  const[anim,setAnim]=useState(false);
  useEffect(()=>{setTimeout(()=>setAnim(true),80)},[]);
  return(
    <div style={{
      flex:1,display:'flex',flexDirection:'column',
      background:`linear-gradient(180deg,#0c2214 0%,${T.bg} 100%)`,
      overflow:'hidden',position:'relative',
    }}>
      {/* Decorative rings */}
      <div style={{position:'absolute',top:-80,right:-80,width:280,height:280,borderRadius:'50%',border:`1px solid ${T.greenB}12`,pointerEvents:'none'}}/>
      <div style={{position:'absolute',top:-40,right:-40,width:180,height:180,borderRadius:'50%',border:`1px solid ${T.greenB}18`,pointerEvents:'none'}}/>
      <div style={{position:'absolute',bottom:120,left:-60,width:200,height:200,borderRadius:'50%',border:`1px solid ${T.gold}10`,pointerEvents:'none'}}/>

      {/* Hero section */}
      <div style={{
        flex:1,display:'flex',flexDirection:'column',alignItems:'center',
        justifyContent:'center',padding:'40px 32px 20px',
        opacity:anim?1:0,transform:anim?'none':'translateY(20px)',
        transition:'all 0.7s cubic-bezier(0.22,1,0.36,1)',
      }}>
        {/* Logo mark */}
        <div style={{
          width:88,height:88,borderRadius:26,
          background:`linear-gradient(145deg,${T.green},${T.greenM})`,
          display:'flex',alignItems:'center',justifyContent:'center',
          boxShadow:`0 0 0 1px ${T.greenB}30, 0 20px 60px ${T.greenB}30`,
          marginBottom:28,
        }}>
          <Logo size={30} light={true}/>
        </div>

        <h1 style={{
          fontFamily:"'DM Serif Display',serif",fontSize:46,
          color:T.text,letterSpacing:-1.5,lineHeight:1,marginBottom:8,textAlign:'center',
        }}>Moovers</h1>
        <p style={{
          color:T.gold,fontSize:10,letterSpacing:4,fontWeight:500,
          marginBottom:24,textTransform:'uppercase',
        }}>Cold Chain Logistics</p>

        <div style={{
          background:T.card,border:`1px solid ${T.border}`,
          borderRadius:16,padding:'18px 22px',marginBottom:32,width:'100%',
          maxWidth:300,
        }}>
          <p style={{
            color:T.textM,fontSize:13,lineHeight:1.75,textAlign:'center',
            fontWeight:300,
          }}>
            Precision refrigerated delivery infrastructure for perishables, pharmaceuticals, and produce.
          </p>
        </div>

        {/* Feature list */}
        {[
          {icon:'❄',text:'Active cold-chain monitoring'},
          {icon:'◎',text:'Real-time GPS tracking'},
          {icon:'⊡',text:'Temperature-controlled cargo'},
        ].map((f,i)=>(
          <div key={i} style={{
            display:'flex',alignItems:'center',gap:12,marginBottom:12,width:'100%',maxWidth:260,
            opacity:anim?1:0,
            transition:`all 0.6s cubic-bezier(0.22,1,0.36,1) ${0.15+i*0.1}s`,
          }}>
            <div style={{
              width:32,height:32,borderRadius:9,background:T.cardLight,
              border:`1px solid ${T.border}`,display:'flex',alignItems:'center',
              justifyContent:'center',fontSize:14,flexShrink:0,
            }}>{f.icon}</div>
            <span style={{color:T.textM,fontSize:12,fontWeight:400}}>{f.text}</span>
          </div>
        ))}
      </div>

      {/* CTA */}
      <div style={{
        padding:'0 24px 40px',
        opacity:anim?1:0,transition:'opacity 0.8s 0.4s',
      }}>
        <Btn onClick={onEnter} style={{
          background:`linear-gradient(135deg,${T.greenM},${T.greenB})`,
          color:T.bg,boxShadow:`0 8px 32px ${T.greenB}40`,
          borderRadius:14,padding:'15px 20px',fontSize:15,
        }}>
          Launch Platform →
        </Btn>
        <p style={{color:T.textD,fontSize:10,textAlign:'center',marginTop:10,letterSpacing:1}}>INVESTOR DEMO · v2.0</p>
      </div>
    </div>
  );
};

// ─── HOME SCREEN ─────────────────────────────────────────────────
const Home=({setScreen})=>(
  <div style={{flex:1,overflowY:'auto',paddingBottom:8,animation:'fadeUp 0.4s ease'}}>
    {/* Header */}
    <div style={{padding:'14px 22px 16px',borderBottom:`1px solid ${T.border}`}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div style={{color:T.textD,fontSize:9,letterSpacing:2,fontWeight:600,marginBottom:3}}>OPERATIONS DASHBOARD</div>
          <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:22,color:T.text,letterSpacing:-0.5}}>Good morning</h2>
        </div>
        <div style={{
          width:42,height:42,borderRadius:13,
          background:`linear-gradient(145deg,${T.green},${T.greenM})`,
          display:'flex',alignItems:'center',justifyContent:'center',
          boxShadow:`0 4px 14px ${T.greenB}30`,
        }}>
          <Logo size={13} light/>
        </div>
      </div>
    </div>

    {/* Active shipment banner */}
    <div style={{padding:'16px 16px 0'}}>
      <div style={{
        background:`linear-gradient(135deg,#0f2e18,#193d22)`,
        border:`1px solid ${T.greenB}30`,
        borderRadius:18,padding:20,position:'relative',overflow:'hidden',marginBottom:14,
      }}>
        <div style={{position:'absolute',right:-30,top:-30,width:130,height:130,borderRadius:'50%',background:T.greenB+'08',pointerEvents:'none'}}/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
          <div>
            <Tag>● LIVE SHIPMENT</Tag>

              MVR-8841<br/>
              <span style={{color:T.textM,fontSize:15,fontWeight:400}}>Techiman → Cape Coast</span>
            </h3>
          </div>
          <div style={{
            background:T.card,border:`1px solid ${T.border}`,
            borderRadius:10,padding:'8px 10px',textAlign:'center',
          }}>
            <div style={{color:T.greenA,fontSize:18,fontWeight:600}}>4°C</div>
            <div style={{color:T.textD,fontSize:8,letterSpacing:1}}>CARGO</div>
          </div>
        </div>
        {/* Progress bar */}
        <div style={{marginBottom:12}}>

            <span style={{color:T.textM,fontSize:9}}>ETA 2h 15m</span>
          </div>
          <div style={{height:4,background:T.border,borderRadius:4}}>
            <div style={{height:'100%',width:'58%',background:`linear-gradient(90deg,${T.greenM},${T.greenB})`,borderRadius:4}}/>
          </div>
        </div>
        <Btn small onClick={()=>setScreen('track')} style={{width:'auto',padding:'8px 16px',background:T.greenB+'22',color:T.greenA,border:`1px solid ${T.greenB}44`,borderRadius:8}}>
          Live Track →
        </Btn>
      </div>
    </div>

    {/* Quick actions */}
    <div style={{padding:'0 16px 14px'}}>
      <div style={{color:T.textD,fontSize:9,letterSpacing:1.8,fontWeight:600,marginBottom:10}}>QUICK ACTIONS</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
        {[
          {icon:'📦',label:'Book Delivery',s:'book'},
          {icon:'◎',label:'Track Shipment',s:'track'},

        ].map((a,i)=>(
          <div key={i} onClick={()=>setScreen(a.s)} style={{
            background:T.card,border:`1px solid ${T.border}`,borderRadius:14,
            padding:'14px 10px',textAlign:'center',cursor:'pointer',
            transition:'all 0.18s',
          }}>
            <div style={{fontSize:22,marginBottom:7}}>{a.icon}</div>
            <div style={{color:T.textM,fontSize:10,fontWeight:500,lineHeight:1.3}}>{a.label}</div>
          </div>
        ))}
      </div>
    </div>

    {/* Fleet status */}
    <div style={{padding:'0 16px 14px'}}>
      <div style={{color:T.textD,fontSize:9,letterSpacing:1.8,fontWeight:600,marginBottom:10}}>FLEET STATUS</div>
      <div style={{
        background:T.card,border:`1px solid ${T.border}`,
        borderRadius:16,padding:16,
      }}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:0}}>

            {v:'3',l:'Active Vehicles',c:T.greenA},

            {v:'99.2%',l:'Uptime',c:T.textM},

            <div key={i} style={{
              textAlign:'center',padding:'6px 4px',
              borderRight:i<2?`1px solid ${T.border}`:'none',
            }}>
              <div style={{fontFamily:"'DM Serif Display',serif",color:s.c,fontSize:22,marginBottom:2}}>{s.v}</div>
              <div style={{color:T.textD,fontSize:9,lineHeight:1.3}}>{s.l}</div>
            </div>
          ))}
        </div>
      </div>
    </div>

    {/* Cold chain integrity */}
    <div style={{padding:'0 16px 16px'}}>
      <div style={{color:T.textD,fontSize:9,letterSpacing:1.8,fontWeight:600,marginBottom:10}}>COLD CHAIN INTEGRITY</div>
      <div style={{
        background:T.card,border:`1px solid ${T.border}`,
        borderRadius:16,padding:16,
      }}>
        {[
          {route:'Techiman → Cape Coast',temp:'4°C',status:'Nominal',ok:true},
          {route:'Kintampo → Winneba',temp:'2°C',status:'Nominal',ok:true},
          {route:'Nkoranza → Kasoa',temp:'6°C',status:'Slight Warm',ok:false},
        ].map((r,i)=>(
          <div key={i} style={{
            display:'flex',alignItems:'center',gap:10,
            paddingBottom:i<2?12:0,marginBottom:i<2?12:0,
            borderBottom:i<2?`1px solid ${T.border}`:'none',
          }}>
            <div style={{
              width:8,height:8,borderRadius:'50%',flexShrink:0,
              background:r.ok?T.greenB:T.gold,
              boxShadow:`0 0 6px ${r.ok?T.greenB:T.gold}`,
              animation:'pulse 2s infinite',
            }}/>
            <div style={{flex:1}}>
              <div style={{color:T.text,fontSize:12,fontWeight:500}}>{r.route}</div>
              <div style={{color:T.textD,fontSize:10,marginTop:1}}>{r.status}</div>
            </div>
            <div style={{
              color:r.ok?T.greenA:T.gold,fontSize:12,fontWeight:600,
              fontFamily:"'DM Serif Display',serif",
            }}>{r.temp}</div>
          </div>
        ))}
      </div>
    </div>
  </div>
);

// ─── BOOKING SCREEN ──────────────────────────────────────────────
const PROD_TYPES=[
  {id:'veg',label:'Fresh Vegetables',icon:'🥬',temp:'-2°C to 4°C'},
  {id:'fish',label:'Fish & Seafood',icon:'🐟',temp:'0°C to 2°C'},
  {id:'meat',label:'Meat & Poultry',icon:'🥩',temp:'-1°C to 4°C'},
  {id:'dairy',label:'Dairy Products',icon:'🥛',temp:'2°C to 6°C'},
  {id:'pharma',label:'Pharmaceuticals',icon:'💊',temp:'2°C to 8°C'},
  {id:'other',label:'Other Perishables',icon:'📦',temp:'Custom'},
];

const BookScreen=()=>{
  const[step,setStep]=useState(1);
  const[form,setForm]=useState({pickup:'',dest:'',prodType:'',qty:'',unit:'crates',tempReq:'',notes:''});
  const[confirmed,setConfirmed]=useState(false);
  const[orderId]=useState('MVR-'+Math.floor(1000+Math.random()*9000));
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));

  const StepBar=()=>(
    <div style={{padding:'14px 22px',display:'flex',alignItems:'center',gap:0}}>
      {['Locations','Cargo','Review'].map((s,i)=>{
        const done=step>i+1,active=step===i+1;
        return(
          <React.Fragment key={i}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
              <div style={{
                width:26,height:26,borderRadius:'50%',fontSize:10,fontWeight:700,
                display:'flex',alignItems:'center',justifyContent:'center',
                background:done?T.greenB:active?T.cardLight:T.card,
                border:`1.5px solid ${done||active?T.greenB:T.border}`,
                color:done?T.bg:active?T.greenA:T.textD,
              }}>{done?'✓':i+1}</div>
              <span style={{fontSize:8,fontWeight:600,letterSpacing:0.8,color:active?T.greenA:T.textD}}>{s}</span>

            {i<2&&<div style={{flex:1,height:1.5,background:done?T.greenB+'60':T.border,marginBottom:14,mx:4}}/>}

  if(confirmed)return(
    <div style={{flex:1,overflowY:'auto',padding:'24px 16px',animation:'scaleIn 0.4s ease'}}>
      <div style={{
        background:`linear-gradient(145deg,${T.card},${T.cardLight})`,
        border:`1px solid ${T.greenB}40`,borderRadius:20,
        padding:24,textAlign:'center',marginBottom:16,
      }}>
        <div style={{
          width:72,height:72,borderRadius:'50%',
          background:T.greenB+'22',border:`2px solid ${T.greenB}`,
          display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:30,margin:'0 auto 16px',
        }}>✓</div>
        <h2 style={{fontFamily:"'DM Serif Display',serif",color:T.text,fontSize:24,marginBottom:6}}>Booking Confirmed</h2>
        <p style={{color:T.textM,fontSize:12,marginBottom:16,lineHeight:1.6}}>Your refrigerated vehicle has been dispatched.</p>
        <div style={{
          background:T.bg,borderRadius:12,padding:'12px 20px',display:'inline-block',
          border:`1px solid ${T.border}`,
        }}>
          <div style={{color:T.textD,fontSize:9,letterSpacing:2,marginBottom:4}}>ORDER ID</div>
          <div style={{fontFamily:"'DM Serif Display',serif",color:T.gold,fontSize:24,letterSpacing:3}}>{orderId}</div>
        </div>
      </div>

      {/* Summary cards */}
      {[
        {l:'Route',v:`${form.pickup} → ${form.dest}`},
        {l:'Cargo',v:`${form.prodType?PROD_TYPES.find(p=>p.id===form.prodType)?.label:'—'} · ${form.qty} ${form.unit}`},
        {l:'Temperature',v:form.tempReq||PROD_TYPES.find(p=>p.id===form.prodType)?.temp||'—'},
        {l:'Vehicle',v:'Twin-O Refrigerated Unit'},
        {l:'Est. Cost',v:'GHS 80 – 150'},
        {l:'Est. Arrival',v:'2 – 3 hours'},
      ].map((d,i)=>(
        <div key={i} style={{
          background:T.card,border:`1px solid ${T.border}`,borderRadius:12,
          padding:'12px 16px',marginBottom:8,
          display:'flex',justifyContent:'space-between',alignItems:'center',
        }}>
          <span style={{color:T.textD,fontSize:11,fontWeight:600,letterSpacing:0.5}}>{d.l}</span>
          <span style={{color:T.text,fontSize:12,maxWidth:'58%',textAlign:'right'}}>{d.v}</span>
        </div>
      ))}

      <div style={{
        background:T.gold+'12',border:`1px solid ${T.gold}35`,
        borderRadius:12,padding:12,marginTop:8,marginBottom:16,
        display:'flex',gap:10,alignItems:'flex-start',
      }}>
        <span style={{fontSize:16}}>❄</span>
        <p style={{color:T.gold,fontSize:11,lineHeight:1.6,fontWeight:400}}>
          Cold-chain integrity is guaranteed throughout transit. Real-time temperature alerts enabled.
        </p>
      </div>
      <Btn variant="secondary" onClick={()=>{setConfirmed(false);setStep(1);setForm({pickup:'',dest:'',prodType:'',qty:'',unit:'crates',tempReq:'',notes:''});}}>
        + New Booking
      </Btn>
    </div>
  );

  return(
    <div style={{flex:1,overflowY:'auto',paddingBottom:16}}>
      <div style={{padding:'14px 22px 12px',borderBottom:`1px solid ${T.border}`}}>
        <div style={{color:T.textD,fontSize:9,letterSpacing:2,fontWeight:600,marginBottom:2}}>COLD CHAIN DELIVERY</div>
        <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:22,color:T.text,letterSpacing:-0.5}}>Book a Shipment</h2>
      </div>
      <StepBar/>

      <div style={{padding:'0 16px'}}>
        {step===1&&(
          <div style={{animation:'slideIn 0.3s ease'}}>
            <div style={{
              background:T.card,border:`1px solid ${T.border}`,borderRadius:16,padding:18,marginBottom:12,
            }}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:T.greenB,boxShadow:`0 0 8px ${T.greenB}`}}/>
                <span style={{color:T.greenA,fontSize:12,fontWeight:600}}>Pickup Location</span>
              </div>
              <Field label="PICKUP ADDRESS">
                <input value={form.pickup} onChange={e=>set('pickup',e.target.value)}
                  placeholder="Farm, warehouse, or facility address…" style={inputSt}/>
              </Field>
            </div>
            <div style={{
              background:T.card,border:`1px solid ${T.border}`,borderRadius:16,padding:18,marginBottom:16,
            }}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:T.gold,boxShadow:`0 0 8px ${T.gold}`}}/>
                <span style={{color:T.goldL,fontSize:12,fontWeight:600}}>Delivery Destination</span>
              </div>
              <Field label="DESTINATION ADDRESS">
                <input value={form.dest} onChange={e=>set('dest',e.target.value)}
                  placeholder="Market, store, hospital, or customer address…" style={inputSt}/>
              </Field>
            </div>
            <Btn disabled={!form.pickup||!form.dest} onClick={()=>setStep(2)}>Continue →</Btn>
          </div>
        )}

        {step===2&&(
          <div style={{animation:'slideIn 0.3s ease'}}>
            <div style={{
              background:T.card,border:`1px solid ${T.border}`,borderRadius:16,padding:18,marginBottom:12,
            }}>
              <div style={{color:T.textD,fontSize:9,letterSpacing:1.8,fontWeight:600,marginBottom:12}}>PRODUCT TYPE</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:4}}>
                {PROD_TYPES.map(p=>(
                  <div key={p.id} onClick={()=>set('prodType',p.id)} style={{
                    background:form.prodType===p.id?T.greenB+'22':T.cardLight,
                    border:`1.5px solid ${form.prodType===p.id?T.greenB:T.border}`,
                    borderRadius:10,padding:'10px 10px',cursor:'pointer',
                    transition:'all 0.15s',
                  }}>
                    <div style={{fontSize:18,marginBottom:4}}>{p.icon}</div>
                    <div style={{color:form.prodType===p.id?T.greenA:T.textM,fontSize:11,fontWeight:500,marginBottom:2}}>{p.label}</div>
                    <div style={{color:T.textD,fontSize:9}}>{p.temp}</div>
                  </div>
                ))}
              </div>
            </div>

            <div style={{
              background:T.card,border:`1px solid ${T.border}`,borderRadius:16,padding:18,marginBottom:12,
            }}>
              <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:10}}>
                <Field label="QUANTITY">
                  <input value={form.qty} onChange={e=>set('qty',e.target.value)}
                    placeholder="e.g. 20" style={inputSt}/>
                </Field>
                <Field label="UNIT">
                  <select value={form.unit} onChange={e=>set('unit',e.target.value)} style={inputSt}>
                    {['crates','bags','kg','litres','vials','boxes','bundles'].map(u=>(
                      <option key={u} value={u}>{u}</option>
                    ))}
                  </select>
                </Field>
              </div>
              <Field label="TEMPERATURE REQUIREMENT (OPTIONAL)">
                <input value={form.tempReq} onChange={e=>set('tempReq',e.target.value)}
                  placeholder="e.g. 2°C to 8°C" style={inputSt}/>
              </Field>
            </div>

            <div style={{display:'flex',gap:10,marginBottom:16}}>
              <Btn variant="secondary" style={{flex:1}} onClick={()=>setStep(1)}>← Back</Btn>
              <Btn style={{flex:2}} disabled={!form.prodType||!form.qty} onClick={()=>setStep(3)}>Review →</Btn>
            </div>
          </div>
        )}

        {step===3&&(
          <div style={{animation:'slideIn 0.3s ease'}}>
            <div style={{
              background:T.card,border:`1px solid ${T.border}`,borderRadius:16,padding:18,marginBottom:12,
            }}>
              <div style={{color:T.textD,fontSize:9,letterSpacing:1.8,fontWeight:600,marginBottom:14}}>ORDER SUMMARY</div>
              {[
                {l:'Pickup',v:form.pickup},
                {l:'Destination',v:form.dest},
                {l:'Product',v:PROD_TYPES.find(p=>p.id===form.prodType)?.label||'—'},
                {l:'Quantity',v:`${form.qty} ${form.unit}`},
                {l:'Temperature',v:form.tempReq||PROD_TYPES.find(p=>p.id===form.prodType)?.temp||'Standard'},
                {l:'Vehicle',v:'Twin-O Refrigerated Unit ❄'},
                {l:'Est. Cost',v:'GHS 80–150'},
              ].map((d,i,arr)=>(
                <div key={i} style={{
                  display:'flex',justifyContent:'space-between',alignItems:'flex-start',
                  paddingBottom:i<arr.length-1?11:0,marginBottom:i<arr.length-1?11:0,
                  borderBottom:i<arr.length-1?`1px solid ${T.border}`:'none',
                }}>
                  <span style={{color:T.textD,fontSize:11,fontWeight:600,letterSpacing:0.3,flexShrink:0}}>{d.l}</span>
                  <span style={{color:T.text,fontSize:12,textAlign:'right',maxWidth:'60%',lineHeight:1.4}}>{d.v}</span>
                </div>
              ))}
            </div>
            <div style={{
              background:T.gold+'10',border:`1px solid ${T.gold}30`,
              borderRadius:12,padding:'10px 14px',marginBottom:14,
              display:'flex',gap:10,
            }}>
              <span>❄</span>
              <p style={{color:T.gold,fontSize:11,lineHeight:1.6}}>Cold-chain integrity monitored from pickup to delivery. Temperature breaches trigger instant alerts.</p>
            </div>
            <div style={{display:'flex',gap:10}}>
              <Btn variant="secondary" style={{flex:1}} onClick={()=>setStep(2)}>← Edit</Btn>
              <Btn style={{flex:2}} onClick={()=>setConfirmed(true)}>Confirm Booking</Btn>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ─── TRACKING SCREEN — FULL-BLEED MAP HERO ───────────────────────
const TrackScreen=()=>{
  // Route is a bezier curve: Techiman (left) → Cape Coast (right)
  // We animate t from 0→1 along the curve
  const[t,setT]=useState(0.28);
  const[temp,setTemp]=useState(4.1);
  const[panelOpen,setPanelOpen]=useState(false);

  useEffect(()=>{
    const iv=setInterval(()=>{
      setT(v=>{if(v>=0.96)return 0.96; return parseFloat((v+0.0018).toFixed(4));});
      setTemp(v=>parseFloat((v+(Math.random()-0.5)*0.07).toFixed(1)));
    },120);
    return()=>clearInterval(iv);
  },[]);

  // Quadratic bezier: P0=pickup, P1=control, P2=dest (in SVG viewBox 0 0 390 340)
  const P0={x:52,y:228};   // Techiman — bottom-left
  const P1={x:195,y:80};   // control point — pulls arc upward
  const P2={x:305,y:210};  // Cape Coast — center-right, away from top-right card

  const bezier=(t,p0,p1,p2)=>({
    x:(1-t)*(1-t)*p0.x+2*(1-t)*t*p1.x+t*t*p2.x,
    y:(1-t)*(1-t)*p0.y+2*(1-t)*t*p1.y+t*t*p2.y,
  });

  // Build SVG path string for the full route
  const routePath=`M ${P0.x} ${P0.y} Q ${P1.x} ${P1.y} ${P2.x} ${P2.y}`;

  // Build "completed" path via polyline sampling
  const sampleRoute=(end,steps=40)=>{
    const pts=[];
    for(let i=0;i<=steps;i++){
      const tt=(i/steps)*end;
      const p=bezier(tt,P0,P1,P2);
      pts.push(`${p.x},${p.y}`);
    }
    return pts.join(' ');
  };

  const truck=bezier(t,P0,P1,P2);
  // Approx tangent for truck rotation
  const ahead=bezier(Math.min(t+0.02,1),P0,P1,P2);
  const angle=Math.atan2(ahead.y-truck.y,ahead.x-truck.x)*180/Math.PI;

  const etaMin=Math.max(0,Math.round((1-t)*135));
  const etaH=Math.floor(etaMin/60);
  const etaM=etaMin%60;
  const pct=Math.round(t*100);
  const stage=t<0.18?0:t<0.85?1:2;
  const stageLabel=['Pickup','In Transit','Delivered'][stage];

  // Map SVG — full viewport, dark logistics aesthetic
  const MapSVG=()=>(
    <svg
      viewBox="0 0 390 340"
      width="100%" height="100%"
      style={{position:'absolute',inset:0,display:'block'}}
      preserveAspectRatio="xMidYMid slice"
    >
      <defs>
        {/* Base map fill */}
        <radialGradient id="mapGlow" cx="50%" cy="50%" r="60%">
          <stop offset="0%" stopColor="#0d2318"/>
          <stop offset="100%" stopColor="#070f09"/>
        </radialGradient>
        {/* Route glow filter */}
        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="3.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glowStrong" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        {/* Truck glow */}
        <filter id="truckGlow" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur stdDeviation="8" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        {/* Grid pattern */}
        <pattern id="mapGrid" width="32" height="32" patternUnits="userSpaceOnUse">
          <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#162a1c" strokeWidth="0.6"/>
        </pattern>
        {/* Completed route gradient */}
        <linearGradient id="doneGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stopColor="#3dba66" stopOpacity="0.6"/>
          <stop offset="100%" stopColor="#62e88c" stopOpacity="0.95"/>
        </linearGradient>
        {/* Undone route */}
        <linearGradient id="todoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stopColor="#1c3825" stopOpacity="0.8"/>
          <stop offset="100%" stopColor="#254d30" stopOpacity="0.6"/>
        </linearGradient>
      </defs>

      {/* Base */}
      <rect width="390" height="340" fill="url(#mapGlow)"/>
      <rect width="390" height="340" fill="url(#mapGrid)"/>

      {/* ── Terrain blobs ── */}
      {/* Forest / farmland zones */}
      <ellipse cx="80" cy="160" rx="55" ry="40" fill="#0e2417" stroke="#182e1e" strokeWidth="1" opacity="0.8"/>
      <ellipse cx="300" cy="270" rx="70" ry="45" fill="#0e2417" stroke="#182e1e" strokeWidth="1" opacity="0.7"/>
      <ellipse cx="160" cy="290" rx="40" ry="25" fill="#0c2014" stroke="#182e1e" strokeWidth="0.8" opacity="0.6"/>

      {/* Water — Gulf of Guinea suggestion at bottom-right */}
      <path d="M 260 310 Q 320 295 390 310 L 390 340 L 260 340 Z"
        fill="#071812" stroke="#0f2b1c" strokeWidth="1" opacity="0.9"/>
      <path d="M 290 325 Q 340 318 390 325" fill="none" stroke="#0d2a1f" strokeWidth="1.5" opacity="0.6"/>

      {/* ── Road network ── */}
      {/* N1 Highway — main artery, thick */}
      <path d="M 0 250 Q 100 240 195 200 Q 280 165 390 160"
        fill="none" stroke="#1e3d28" strokeWidth="7" strokeLinecap="round"/>
      <path d="M 0 250 Q 100 240 195 200 Q 280 165 390 160"
        fill="none" stroke="#243f2c" strokeWidth="4" strokeLinecap="round"/>

      {/* Secondary roads */}
      <path d="M 50 340 Q 70 280 52 228" fill="none" stroke="#1a3322" strokeWidth="4" strokeLinecap="round"/>
      <path d="M 52 228 Q 55 170 90 130 Q 130 90 180 80"
        fill="none" stroke="#1a3322" strokeWidth="4" strokeLinecap="round"/>
      <path d="M 180 80 Q 250 75 338 195"
        fill="none" stroke="#1a3322" strokeWidth="4" strokeLinecap="round"/>
      <path d="M 338 195 Q 355 230 370 280 L 380 340"
        fill="none" stroke="#1a3322" strokeWidth="4" strokeLinecap="round"/>

      {/* Branch roads */}
      <path d="M 130 200 L 130 320" fill="none" stroke="#182e1e" strokeWidth="2.5" strokeLinecap="round"/>
      <path d="M 240 160 L 255 270" fill="none" stroke="#182e1e" strokeWidth="2.5" strokeLinecap="round"/>
      <path d="M 60 180 L 190 175" fill="none" stroke="#182e1e" strokeWidth="2" strokeLinecap="round" strokeDasharray="4 3"/>
      <path d="M 200 130 L 340 140" fill="none" stroke="#182e1e" strokeWidth="2" strokeLinecap="round" strokeDasharray="4 3"/>

      {/* ── Delivery route: undone portion (ghost) ── */}
      <path d={routePath}
        fill="none" stroke="#254d30" strokeWidth="5" strokeLinecap="round"
        strokeDasharray="10 5"
        style={{animation:'routeDash 1.2s linear infinite'}}
        opacity="0.55"
      />

      {/* ── Delivery route: completed glow ── */}
      <polyline points={sampleRoute(t)}
        fill="none" stroke={T.greenB} strokeWidth="5.5" strokeLinecap="round"
        filter="url(#glow)" opacity="0.5"
      />
      <polyline points={sampleRoute(t)}
        fill="none" stroke={T.greenA} strokeWidth="3" strokeLinecap="round"
        opacity="0.9"
      />

      {/* ── Pickup pin: Techiman ── */}
      {/* Pin shadow */}
      <ellipse cx={P0.x} cy={P0.y+20} rx="10" ry="4" fill="black" opacity="0.3"/>
      {/* Pin body */}
      <path d={`M ${P0.x} ${P0.y-2} C ${P0.x-16} ${P0.y-18} ${P0.x-16} ${P0.y-36} ${P0.x} ${P0.y-36} C ${P0.x+16} ${P0.y-36} ${P0.x+16} ${P0.y-18} ${P0.x} ${P0.y-2} Z`}
        fill={T.gold} filter="url(#glow)"/>
      <circle cx={P0.x} cy={P0.y-22} r="8" fill={T.bg}/>
      {/* Warehouse glyph */}
      <polygon points={`${P0.x},${P0.y-30} ${P0.x-6},${P0.y-26} ${P0.x+6},${P0.y-26}`} fill={T.goldL}/>
      <rect x={P0.x-5} y={P0.y-26} width="10" height="7" rx="1" fill={T.goldL}/>
      <rect x={P0.x-1.5} y={P0.y-22} width="3" height="4" rx="0.5" fill={T.bg}/>

      {/* ── Destination pin: Cape Coast ── */}
      <ellipse cx={P2.x} cy={P2.y+20} rx="10" ry="4" fill="black" opacity="0.3"/>
      <path d={`M ${P2.x} ${P2.y-2} C ${P2.x-16} ${P2.y-18} ${P2.x-16} ${P2.y-36} ${P2.x} ${P2.y-36} C ${P2.x+16} ${P2.y-36} ${P2.x+16} ${P2.y-18} ${P2.x} ${P2.y-2} Z`}
        fill={T.greenB} filter="url(#glow)"/>
      <circle cx={P2.x} cy={P2.y-22} r="8" fill={T.bg}/>
      {/* Store glyph */}
      <rect x={P2.x-6} y={P2.y-28} width="12" height="9" rx="1" fill={T.greenA}/>
      <polygon points={`${P2.x-7},${P2.y-28} ${P2.x},${P2.y-33} ${P2.x+7},${P2.y-28}`} fill={T.greenB}/>
      <rect x={P2.x-2} y={P2.y-24} width="4" height="5" rx="0.5" fill={T.bg}/>

      {/* Destination pulse ring */}
      <circle cx={P2.x} cy={P2.y-22} r="14" fill="none" stroke={T.greenB}
        strokeWidth="1.5" opacity="0.5"
        style={{animation:'tempPulse 2s ease-out infinite'}}/>

      {/* ── Truck ── */}
      {/* Glow halo */}
      <circle cx={truck.x} cy={truck.y} r="22"
        fill={T.greenB} opacity="0.08" filter="url(#truckGlow)"/>
      <circle cx={truck.x} cy={truck.y} r="14"
        fill={T.greenB} opacity="0.12"/>

      {/* Truck body — rendered as group with rotation */}
      <g transform={`translate(${truck.x},${truck.y}) rotate(${angle})`}>
        {/* Cargo box */}
        <rect x="-18" y="-8" width="22" height="14" rx="2.5" fill="#0e1f12" stroke={T.greenB} strokeWidth="1.5"/>
        {/* Cab */}
        <path d="M 4 -6 L 4 6 L 18 6 L 18 0 L 13 -6 Z" fill={T.greenM} stroke={T.greenB} strokeWidth="1.2"/>
        {/* Vent lines on cargo */}
        <line x1="-14" y1="-4" x2="-14" y2="4" stroke={T.greenA} strokeWidth="1" opacity="0.5"/>
        <line x1="-9" y1="-4" x2="-9" y2="4" stroke={T.greenA} strokeWidth="1" opacity="0.5"/>
        <line x1="-4" y1="-4" x2="-4" y2="4" stroke={T.greenA} strokeWidth="1" opacity="0.5"/>
        {/* Wheels */}
        <circle cx="-10" cy="8" r="4" fill="#050e07" stroke={T.greenB} strokeWidth="1.5"/>
        <circle cx="-10" cy="8" r="1.8" fill={T.greenM}/>
        <circle cx="11" cy="8" r="4" fill="#050e07" stroke={T.greenB} strokeWidth="1.5"/>
        <circle cx="11" cy="8" r="1.8" fill={T.greenM}/>
        {/* Headlight */}
        <rect x="16" y="-3" width="3" height="5" rx="1" fill={T.goldL} opacity="0.9"/>
        {/* Snowflake badge */}
        <text x="-11" y="2" fontSize="7" fill={T.greenA} textAnchor="middle" fontWeight="bold">❄</text>
      </g>

      {/* ── Place name labels ── */}
      <rect x={P0.x-28} y={P0.y+5} width="56" height="14" rx="3" fill={T.bg} opacity="0.75"/>
      <text x={P0.x} y={P0.y+15} fontSize="9" fill={T.goldL} textAnchor="middle" fontWeight="700" letterSpacing="0.5">TECHIMAN</text>

      <rect x={P2.x-30} y={P2.y+5} width="60" height="14" rx="3" fill={T.bg} opacity="0.75"/>
      <text x={P2.x} y={P2.y+15} fontSize="9" fill={T.greenA} textAnchor="middle" fontWeight="700" letterSpacing="0.5">CAPE COAST</text>
    </svg>
  );

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',position:'relative',animation:'fadeIn 0.3s ease'}}>

      {/* ── FULL-BLEED MAP ── */}
      <div style={{position:'relative',flex:'0 0 auto',height:340,overflow:'hidden'}}>
        <MapSVG/>

        {/* Top header overlay — glassmorphism */}
        <div style={{
          position:'absolute',top:0,left:0,right:0,
          background:'linear-gradient(to bottom, rgba(7,15,9,0.92) 0%, rgba(7,15,9,0.0) 100%)',
          padding:'10px 18px 28px',
          display:'flex',justifyContent:'flex-start',alignItems:'flex-start',
          zIndex:40,
        }}>
          <div>
            <div style={{color:T.textD,fontSize:8,letterSpacing:2,fontWeight:700,marginBottom:3}}>LIVE TRACKING</div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{fontFamily:"'DM Serif Display',serif",color:T.text,fontSize:20,letterSpacing:-0.5,lineHeight:1}}>MVR-8841</div>
              <div style={{
                background:'rgba(7,15,9,0.7)',border:`1px solid ${T.greenB}50`,
                backdropFilter:'blur(10px)',borderRadius:20,
                padding:'3px 9px',display:'flex',alignItems:'center',gap:5,
              }}>
                <div style={{width:6,height:6,borderRadius:'50%',background:T.greenB,animation:'pulse 1.4s infinite'}}/>
                <span style={{color:T.greenA,fontSize:9,fontWeight:700,letterSpacing:1}}>LIVE</span>
              </div>
            </div>
          </div>
        </div>

        {/* ── TEMPERATURE HERO CARD — bottom-right corner, clear of route ── */}
        <div style={{
          position:'absolute',top:48,right:10,
          zIndex:50,width:118,
          background:'rgba(7,15,9,0.85)',
          backdropFilter:'blur(12px)',
          border:`1px solid ${T.greenB}40`,
          borderRadius:10,
          padding:'7px 10px',
          boxShadow:`0 4px 16px rgba(0,0,0,0.6), 0 0 0 1px ${T.greenB}12`,
        }}>
          {/* Temp reading + status on one line */}
          <div style={{display:'flex',alignItems:'baseline',gap:4,marginBottom:4}}>
            <span style={{fontFamily:"'DM Serif Display',serif",fontSize:22,color:T.greenA,lineHeight:1,textShadow:`0 0 10px ${T.greenB}60`}}>
              {temp.toFixed(1)}°C
            </span>
            <span style={{fontSize:10}}>❄</span>
          </div>
          <div style={{color:T.greenB,fontSize:8,fontWeight:700,letterSpacing:0.5,marginBottom:6}}>Cold Chain Secure</div>
          {/* Divider */}
          <div style={{height:1,background:T.border,marginBottom:5}}/>
          {/* ETA + Progress compact */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{color:T.textD,fontSize:7,letterSpacing:0.8,marginBottom:1}}>ETA</div>
              <div style={{fontFamily:"'DM Serif Display',serif",color:T.goldL,fontSize:12,lineHeight:1}}>{etaH}h {etaM}m</div>
            </div>
            <div style={{width:1,height:20,background:T.border}}/>
            <div>
              <div style={{color:T.textD,fontSize:7,letterSpacing:0.8,marginBottom:1}}>DONE</div>
              <div style={{fontFamily:"'DM Serif Display',serif",color:T.text,fontSize:12,lineHeight:1}}>{pct}%</div>
            </div>
          </div>
        </div>

        {/* Bottom map fade */}
        <div style={{
          position:'absolute',bottom:0,left:0,right:0,height:60,
          background:'linear-gradient(to top, rgba(7,15,9,1) 0%, rgba(7,15,9,0) 100%)',
          pointerEvents:'none',zIndex:30,
        }}/>
      </div>

      {/* ── BOTTOM PANEL (scrollable) ── */}
      <div style={{
        flex:1,overflowY:'auto',
        background:T.bg,
        borderTop:`1px solid ${T.border}`,
        paddingBottom:8,
      }}>

        {/* Stage progress strip */}
        <div style={{padding:'14px 18px 12px'}}>
          <div style={{display:'flex',alignItems:'center'}}>
            {['Pickup','In Transit','Delivered'].map((s,i)=>{
              const done=stage>i,active=stage===i;
              return(
                <React.Fragment key={i}>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,zIndex:1}}>
                    <div style={{
                      width:30,height:30,borderRadius:'50%',
                      background:done?T.greenB:active?`${T.greenB}25`:T.card,
                      border:`2px solid ${done?T.greenB:active?T.greenB:T.border}`,
                      display:'flex',alignItems:'center',justifyContent:'center',
                      fontSize:12,color:done?T.bg:active?T.greenA:T.textD,fontWeight:700,
                      boxShadow:active?`0 0 12px ${T.greenB}60`:'none',
                      transition:'all 0.4s',
                    }}>{done?'✓':active?'▶':'○'}</div>
                    <span style={{
                      fontSize:8,fontWeight:700,letterSpacing:0.8,
                      color:active?T.greenA:done?T.greenB:T.textD,
                      whiteSpace:'nowrap',
                    }}>{s}</span>
                  </div>
                  {i<2&&(
                    <div style={{
                      flex:1,height:2,
                      background:done?T.greenB:T.border,
                      marginBottom:14,marginLeft:4,marginRight:4,
                      transition:'background 0.4s',
                      borderRadius:2,
                    }}/>
                  )}
                </React.Fragment>
              );
            })}
          </div>

          {/* Progress bar */}
          <div style={{marginTop:14}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
              <span style={{color:T.textD,fontSize:9,letterSpacing:1}}>Techiman</span>
              <span style={{color:T.textM,fontSize:9,fontWeight:600}}>{stageLabel}</span>
              <span style={{color:T.textD,fontSize:9,letterSpacing:1}}>Cape Coast</span>
            </div>
            <div style={{height:5,background:T.card,borderRadius:5,border:`1px solid ${T.border}`}}>
              <div style={{
                height:'100%',
                width:`${pct}%`,
                background:`linear-gradient(90deg,${T.greenM},${T.greenB})`,
                borderRadius:5,
                boxShadow:`0 0 8px ${T.greenB}60`,
                transition:'width 0.3s linear',
                position:'relative',
                overflow:'visible',
              }}>
                <div style={{
                  position:'absolute',right:-4,top:'50%',transform:'translateY(-50%)',
                  width:10,height:10,borderRadius:'50%',
                  background:T.greenA,
                  boxShadow:`0 0 8px ${T.greenA}`,
                }}/>
              </div>
            </div>
          </div>
        </div>

        {/* Two stat cards */}
        <div style={{padding:'0 16px 12px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          {/* Temp card */}
          <div style={{
            background:T.card,border:`1px solid ${T.greenB}30`,
            borderRadius:14,padding:'12px 14px',
            boxShadow:`inset 0 1px 0 ${T.greenB}15`,
          }}>
            <div style={{color:T.textD,fontSize:8,letterSpacing:1.2,fontWeight:600,marginBottom:6}}>CARGO TEMP</div>
            <div style={{fontFamily:"'DM Serif Display',serif",color:T.greenA,fontSize:24,lineHeight:1,marginBottom:3}}>
              {temp.toFixed(1)}°C
            </div>
            <div style={{display:'flex',alignItems:'center',gap:4}}>
              <div style={{width:5,height:5,borderRadius:'50%',background:T.greenB,animation:'pulse 1.6s infinite'}}/>
              <span style={{color:T.greenB,fontSize:9,fontWeight:600}}>Optimal</span>
            </div>
            <div style={{color:T.textD,fontSize:8,marginTop:4}}>Range: 2°C – 6°C</div>
          </div>

          {/* ETA card */}
          <div style={{
            background:T.card,border:`1px solid ${T.gold}25`,
            borderRadius:14,padding:'12px 14px',
            boxShadow:`inset 0 1px 0 ${T.gold}10`,
          }}>
            <div style={{color:T.textD,fontSize:8,letterSpacing:1.2,fontWeight:600,marginBottom:6}}>EST. ARRIVAL</div>
            <div style={{fontFamily:"'DM Serif Display',serif",color:T.goldL,fontSize:24,lineHeight:1,marginBottom:3}}>
              {etaH}h {String(etaM).padStart(2,'0')}m
            </div>
            <div style={{display:'flex',alignItems:'center',gap:4}}>
              <div style={{width:5,height:5,borderRadius:'50%',background:T.gold,animation:'pulse 1.9s infinite'}}/>
              <span style={{color:T.gold,fontSize:9,fontWeight:600}}>On Schedule</span>
            </div>
            <div style={{color:T.textD,fontSize:8,marginTop:4}}>Vehicle TW-003</div>
          </div>
        </div>

        {/* Shipment detail row */}
        <div style={{padding:'0 16px 8px'}}>
          <div style={{
            background:T.card,border:`1px solid ${T.border}`,
            borderRadius:14,padding:'12px 14px',
          }}>
            <div style={{color:T.textD,fontSize:8,letterSpacing:1.8,fontWeight:700,marginBottom:10}}>SHIPMENT DETAILS</div>
            {[
              {l:'Cargo',v:'Fresh Tilapia · 15 baskets'},
              {l:'Vehicle',v:'Twin-O TW-003 · Solar'},
              {l:'Refrigeration',v:'Active · Solar-powered'},
              {l:'Route',v:'Techiman → Cape Coast'},
            ].map((d,i,arr)=>(
              <div key={i} style={{
                display:'flex',justifyContent:'space-between',alignItems:'center',
                paddingBottom:i<arr.length-1?9:0,marginBottom:i<arr.length-1?9:0,
                borderBottom:i<arr.length-1?`1px solid ${T.border}`:'none',
              }}>
                <span style={{color:T.textD,fontSize:10}}>{d.l}</span>
                <span style={{color:T.text,fontSize:11,fontWeight:500}}>{d.v}</span>
              </div>
            ))}
          </div>
        </div>

      </div>
    </div>
  );
};

// ─── HISTORY SCREEN ──────────────────────────────────────────────
const HistoryScreen=()=>{
  const orders=[
    {id:'MVR-8841',route:'Techiman → Cape Coast',cargo:'Fresh Tilapia · 15 baskets',date:'Today',status:'In Transit',temp:'4.1°C',ok:true,cost:'GHS 120'},
    {id:'MVR-8822',route:'Kintampo → Winneba',cargo:'Tomatoes · 20 crates',date:'Yesterday',status:'Delivered',temp:'3.9°C',ok:true,cost:'GHS 95'},
    {id:'MVR-8800',route:'Nkoranza → Cape Coast',cargo:'COVID-19 Vaccines · 200 vials',date:'2 June',status:'Delivered',temp:'5.2°C',ok:true,cost:'Gov. Supply'},
    {id:'MVR-8774',route:'Atebubu → Kasoa',cargo:'Goat Meat · 30kg',date:'1 June',status:'Delivered',temp:'2.8°C',ok:true,cost:'GHS 140'},
    {id:'MVR-8751',route:'Techiman → Saltpond',cargo:'Fresh Cow Milk · 80 litres',date:'30 May',status:'Delivered',temp:'4.5°C',ok:true,cost:'GHS 85'},
    {id:'MVR-8730',route:'Cape Coast → Kasoa',cargo:'Garden Eggs · 5 bags',date:'28 May',status:'Delivered',temp:'4.0°C',ok:true,cost:'GHS 60'},
  ];

  return(
    <div style={{flex:1,overflowY:'auto',paddingBottom:8,animation:'fadeUp 0.35s ease'}}>
      <div style={{padding:'14px 22px 12px',borderBottom:`1px solid ${T.border}`}}>
        <div style={{color:T.textD,fontSize:9,letterSpacing:2,fontWeight:600,marginBottom:2}}>LOGISTICS RECORD</div>
        <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:22,color:T.text,letterSpacing:-0.5}}>Delivery History</h2>
      </div>

      {/* Summary strip */}
      <div style={{padding:'14px 16px 0'}}>
        <div style={{
          background:`linear-gradient(135deg,${T.card},${T.cardLight})`,
          border:`1px solid ${T.border}`,borderRadius:16,padding:14,marginBottom:14,
          display:'grid',gridTemplateColumns:'1fr 1fr 1fr',
        }}>
          {[
            {v:'24',l:'Total Deliveries',c:T.greenA},
            {v:'99%',l:'Cold-Chain Success',c:T.goldL},
            {v:'0',l:'Spoilage Events',c:T.textM},
          ].map((s,i)=>(
            <div key={i} style={{
              textAlign:'center',
              borderRight:i<2?`1px solid ${T.border}`:'none',
              padding:'4px 0',
            }}>
              <div style={{fontFamily:"'DM Serif Display',serif",color:s.c,fontSize:22,marginBottom:2}}>{s.v}</div>
              <div style={{color:T.textD,fontSize:8,lineHeight:1.3}}>{s.l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Orders list */}
      <div style={{padding:'0 16px'}}>
        {orders.map((o,i)=>(
          <div key={i} style={{
            background:T.card,border:`1px solid ${T.border}`,
            borderRadius:14,padding:14,marginBottom:10,
            animation:`fadeUp 0.3s ease ${i*0.05}s both`,
          }}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
              <div>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                  <span style={{fontFamily:"'DM Serif Display',serif",color:T.gold,fontSize:15,letterSpacing:0.5}}>{o.id}</span>
                  <Tag color={o.status==='In Transit'?T.greenB:T.textM} small>
                    {o.status==='In Transit'?'● ':''}{o.status}
                  </Tag>
                </div>
                <div style={{color:T.text,fontSize:12,fontWeight:500,marginBottom:2}}>{o.route}</div>
                <div style={{color:T.textD,fontSize:11}}>{o.cargo}</div>
              </div>
              <div style={{textAlign:'right',flexShrink:0,paddingLeft:8}}>
                <div style={{color:T.greenA,fontSize:13,fontWeight:600,fontFamily:"'DM Serif Display',serif"}}>{o.cost}</div>
                <div style={{color:T.textD,fontSize:9,marginTop:2}}>{o.date}</div>
              </div>
            </div>
            <div style={{
              background:T.cardLight,border:`1px solid ${T.border}`,
              borderRadius:8,padding:'7px 10px',
              display:'flex',alignItems:'center',gap:8,
            }}>
              <span style={{fontSize:12}}>❄</span>
              <span style={{color:T.greenA,fontSize:10,fontWeight:600}}>Cold-chain intact</span>
              <span style={{color:T.textD,fontSize:10,marginLeft:'auto'}}>{o.temp} avg</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

// ─── APP ─────────────────────────────────────────────────────────
const App=()=>{
  const[splashed,setSplashed]=useState(false);
  const[screen,setScreen]=useState('home');
  return(
    <div style={{
      background:T.bg,minHeight:'100vh',
      display:'flex',justifyContent:'center',
    }}>
      <div style={{
        width:'100%',maxWidth:390,minHeight:'100vh',
        background:T.bg,display:'flex',flexDirection:'column',
        position:'relative',
      }}>
        <StatusBar/>
        {!splashed?(
          <Splash onEnter={()=>setSplashed(true)}/>
        ):(
          <>
            <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
              {screen==='home'    &&<Home    setScreen={setScreen}/>}
              {screen==='book'    &&<BookScreen/>}
              {screen==='track'   &&<TrackScreen/>}
              {screen==='history' &&<HistoryScreen/>}
            </div>
            <BottomNav screen={screen} setScreen={setScreen}/>
          </>
        )}
      </div>
    </div>
  );
};

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
