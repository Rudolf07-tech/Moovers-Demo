const REGIONS = ["Bono East Region", "Central Region"];
const TOWNS = {
  "Bono East Region": ["Techiman","Kintampo","Nkoranza","Atebubu","Yeji"],
  "Central Region":   ["Cape Coast","Kasoa","Winneba","Saltpond","Mankessim"],
};

const fmt = (price, unit) => price === 0 ? "Gov. Supply" : `GHS ${price}`;
const fmtUnit = (price, unit) => price === 0 ? "" : `/${unit}`;

// ── Shared UI ──────────────────────────────────────────────────

const Logo = ({ size = 48, ringColor = C.greenBright, coreColor = C.bg }) => {
  const r = size / 2, gap = r * 0.18, d = r * 2 + gap;
  const outer = r, ring = r * 0.6, inner = r * 0.38;
  return (
    <svg width={d * 2} height={r * 2} viewBox={`0 0 ${d * 2} ${r * 2}`} fill="none">
      <circle cx={r} cy={r} r={outer} fill={coreColor}/>
      <circle cx={r} cy={r} r={ring}  fill={ringColor}/>
      <circle cx={r} cy={r} r={inner} fill={coreColor}/>
      <circle cx={r + d} cy={r} r={outer} fill={coreColor}/>
      <circle cx={r + d} cy={r} r={ring}  fill={ringColor}/>
      <circle cx={r + d} cy={r} r={inner} fill={coreColor}/>
    </svg>
  );
};

const Tag = ({ children, color = C.green }) => (
  <span style={{
    background: color + "33", color: color === C.green ? C.greenAccent : color,
    border: `1px solid ${color}55`, borderRadius: 4, padding: "2px 8px",
    fontSize: 10, fontFamily: "sans-serif", letterSpacing: 0.5, display:"inline-block",
  }}>{children}</span>
);

const Card = ({ children, style={}, onClick }) => (
  <div onClick={onClick} style={{
    background: C.bgCard, borderRadius: 14,
    border: `1px solid ${C.border}`, padding: 16, ...style,
  }}>{children}</div>
);

const Btn = ({ children, onClick, variant="primary", style={}, disabled=false }) => {
  const base = {
    border:"none", borderRadius:10, padding:"13px 20px", cursor: disabled ? "not-allowed" : "pointer",
    fontFamily:"sans-serif", fontWeight:700, fontSize:14, letterSpacing:0.5,
    transition:"all 0.15s", width:"100%", opacity: disabled ? 0.45 : 1,
  };
  const v = {
    primary:   { background: C.greenBright, color: C.bg },
    secondary: { background: "transparent", color: C.greenAccent, border: `1px solid ${C.greenBright}` },
  };
  return <button onClick={disabled ? undefined : onClick} style={{...base,...v[variant],...style}}>{children}</button>;
};

const inputStyle = {
  width:"100%", background:C.bgCardLight, border:`1px solid ${C.border}`,
  borderRadius:10, padding:"12px 14px", color:C.text, fontSize:14,
  fontFamily:"sans-serif", outline:"none",
};
const labelStyle = {
  color:C.textMuted, fontSize:11, fontFamily:"sans-serif",
  letterSpacing:0.5, marginBottom:6, display:"block",
};

// ── Bottom Nav ─────────────────────────────────────────────────

const BottomNav = ({ screen, setScreen }) => {
  const tabs = [
    { id:"home",     label:"Home",     icon:"⌂" },
    { id:"market",   label:"Market",   icon:"⚖" },
    { id:"delivery", label:"Delivery", icon:"🚲" },
    { id:"profile",  label:"Profile",  icon:"◎" },
  ];
  return (
    <div style={{ display:"flex", borderTop:`1px solid ${C.border}`, background:C.bgCard, padding:"8px 0 20px", flexShrink:0 }}>
      {tabs.map(t => (
        <button key={t.id} onClick={() => setScreen(t.id)} style={{
          flex:1, background:"none", border:"none", cursor:"pointer",
          display:"flex", flexDirection:"column", alignItems:"center", gap:2,
          color: screen === t.id ? C.greenAccent : C.textDim,
          padding:"4px 0",
        }}>
          <span style={{ fontSize: screen === t.id ? 20 : 18 }}>{t.icon}</span>
          <span style={{ fontSize:9, fontFamily:"sans-serif", letterSpacing:0.5 }}>{t.label}</span>
        </button>
      ))}
    </div>
  );
};

      <div style={{ position:"absolute", top:20, left:-20, width:80, height:80, borderRadius:"50%", background:C.gold+"08", border:`1px solid ${C.gold}20` }}/>
      <div style={{ marginBottom:18 }}>
        <div style={{
          width:76, height:76, borderRadius:22, background:C.greenBright,
          display:"flex", alignItems:"center", justifyContent:"center",
          margin:"0 auto", boxShadow:`0 0 32px ${C.greenBright}44`,
        }}>
          <Logo size={18} ringColor={C.bg} coreColor={C.greenBright}/>
        </div>
      </div>
      <h1 style={{ color:C.text, fontSize:38, margin:"0 0 4px", letterSpacing:-1 }}>Moovers</h1>
      <p style={{ color:C.gold, fontSize:11, letterSpacing:3, fontFamily:"sans-serif", margin:"0 0 14px" }}>COLD CHAIN · FRESH PRODUCE</p>
      <p style={{ color:C.textMuted, fontSize:13, lineHeight:1.7, fontFamily:"sans-serif", maxWidth:280, margin:"0 auto" }}>
        Solar-powered cold chain delivery for perishable produce, fish, meat, vaccines and dairy.
      </p>
    </div>

    <div style={{ padding:"24px 20px", flex:1 }}>
      {[
        { icon:"❄️", title:"Cold Chain Delivery", desc:"Solar-powered refrigerated tricycles keeping your goods fresh from source to destination." },
        { icon:"⚖️", title:"Fresh Produce Marketplace", desc:"Connect directly with farmers and suppliers in Bono East & Central Region." },
        { icon:"📍", title:"Real-Time Tracking", desc:"Know exactly where your delivery is at every stage." },
      ].map((f,i) => (
        <div key={i} style={{ display:"flex", gap:14, marginBottom:20, alignItems:"flex-start" }}>
          <div style={{
            width:44, height:44, borderRadius:12, background:C.bgCard,

          }}>{f.icon}</div>
          <div>

      <div style={{

        display:"flex", alignItems:"center", gap:10,
      }}>
        <span style={{ fontSize:18 }}>📍</span>
        <div>
          <div style={{ color:C.gold, fontSize:11, fontFamily:"sans-serif", fontWeight:"bold", letterSpacing:0.5 }}>PILOT REGIONS</div>
          <div style={{ color:C.text, fontSize:12, fontFamily:"sans-serif" }}>Bono East Region · Central Region</div>
        </div>
      </div>

      <Btn onClick={onEnter}>Get Started →</Btn>

// ── Market ─────────────────────────────────────────────────────

const Market = ({ setScreen }) => {
  const [region,   setRegion]   = useState("All");
  const [cat,      setCat]      = useState("All");
  const [selected, setSelected] = useState(null);
  const [liked,    setLiked]    = useState([]);
  const [success,  setSuccess]  = useState(false);

  const list = CROPS
    .filter(c => region === "All" || c.region.includes(region))
    .filter(c => cat    === "All" || c.cat === cat);

  const sendInterest = (crop) => {
    setLiked(p => [...p, crop.id]);
    setSelected(null);
    setSuccess(true);
    setTimeout(() => setSuccess(false), 3000);
  };

  return (
    <div style={{ flex:1, overflowY:"auto", paddingBottom:16 }}>
      <div style={{ padding:"16px 20px 12px", borderBottom:`1px solid ${C.border}` }}>
        <div style={{ color:C.text, fontSize:20 }}>Produce Market</div>
        <div style={{ color:C.textMuted, fontSize:12, fontFamily:"sans-serif" }}>Fresh listings — cold delivered</div>
      </div>

      <div style={{ padding:"12px 16px 4px", display:"flex", gap:8, overflowX:"auto" }}>
        {["All","Bono East","Central"].map(f => (
          <button key={f} onClick={() => setRegion(f)} style={{
            padding:"6px 14px", borderRadius:20, cursor:"pointer",
            border:`1px solid ${region===f ? C.greenBright : C.border}`,
            background: region===f ? C.greenBright+"22" : "transparent",
            color: region===f ? C.greenAccent : C.textMuted,
            fontSize:12, fontFamily:"sans-serif", whiteSpace:"nowrap",
          }}>{f}</button>
        ))}
      </div>

      <div style={{ padding:"6px 16px 12px", display:"flex", gap:8, overflowX:"auto" }}>
        {["All","Vegetables","Fish","Meat","Vaccines","Dairy"].map(f => (
          <button key={f} onClick={() => setCat(f)} style={{
            padding:"5px 12px", borderRadius:20, cursor:"pointer",
            border:`1px solid ${cat===f ? C.gold : C.border}`,
            background: cat===f ? C.gold+"22" : "transparent",
            color: cat===f ? C.goldLight : C.textDim,
            fontSize:11, fontFamily:"sans-serif", whiteSpace:"nowrap",
          }}>{f}</button>
        ))}
      </div>

      {success && (
        <div style={{
          margin:"0 16px 12px", padding:"12px 16px", borderRadius:10,
          background:C.greenBright+"22", border:`1px solid ${C.greenBright}`,
          color:C.greenAccent, fontSize:12, fontFamily:"sans-serif", textAlign:"center",
        }}>✓ Interest sent! The seller will contact you shortly.</div>
      )}

      <div style={{ padding:"0 16px" }}>
        {list.map(crop => (
          <Card key={crop.id} style={{ marginBottom:12, cursor:"pointer" }} onClick={() => setSelected(crop)}>
            <div style={{ display:"flex", gap:12, alignItems:"flex-start" }}>
              <div style={{
                width:56, height:56, borderRadius:14, background:C.bgCardLight,
                display:"flex", alignItems:"center", justifyContent:"center", fontSize:30, flexShrink:0,
              }}>{crop.img}</div>
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                  <div style={{ color:C.text, fontSize:15, fontFamily:"sans-serif", fontWeight:"bold" }}>{crop.name}</div>
                  <div style={{ color:C.greenAccent, fontSize:15, fontFamily:"sans-serif", fontWeight:"bold" }}>{fmt(crop.price)}</div>
                </div>
                <div style={{ color:C.textMuted, fontSize:11, fontFamily:"sans-serif", marginTop:2 }}>👤 {crop.seller}</div>
                <div style={{ display:"flex", gap:6, marginTop:8, flexWrap:"wrap" }}>
                  <Tag>{crop.region}</Tag>
                  <Tag color={crop.fresh==="Harvested today" ? C.greenBright : C.gold}>
                    {crop.fresh==="Harvested today" ? "🟢 " : "🟡 "}{crop.fresh}
                  </Tag>
                </div>
              </div>
            </div>
            <div style={{
              marginTop:10, paddingTop:10, borderTop:`1px solid ${C.border}`,
              display:"flex", justifyContent:"space-between", alignItems:"center",
            }}>
              <span style={{ color:C.textMuted, fontSize:11, fontFamily:"sans-serif" }}>
                Qty: {crop.qty} {crop.unit}s
              </span>
              {liked.includes(crop.id)
                ? <span style={{ color:C.greenAccent, fontSize:11, fontFamily:"sans-serif" }}>✓ Interested</span>
                : <span style={{ color:C.greenBright, fontSize:11, fontFamily:"sans-serif" }}>Tap to view →</span>
              }
            </div>
          </Card>
        ))}
      </div>

      {selected && (
        <div
          onClick={() => setSelected(null)}
          style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.82)", display:"flex", alignItems:"flex-end", zIndex:100 }}
        >
          <div
            onClick={e => e.stopPropagation()}
            style={{
              background:C.bgCard, borderRadius:"20px 20px 0 0",
              border:`1px solid ${C.border}`, padding:24,
              width:"100%", maxWidth:390, margin:"0 auto",
            }}
          >
            <div style={{ textAlign:"center", fontSize:52, marginBottom:12 }}>{selected.img}</div>
            <h2 style={{ color:C.text, fontSize:22, textAlign:"center", margin:"0 0 4px" }}>{selected.name}</h2>
            <p style={{ color:C.textMuted, fontSize:12, fontFamily:"sans-serif", textAlign:"center", margin:"0 0 16px" }}>
              {selected.seller} · {selected.region}
            </p>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:16 }}>
              {[
                { l:"Price",     v: selected.price===0 ? "Gov. Supply" : `GHS ${selected.price}/${selected.unit}` },
                { l:"Available", v:`${selected.qty} ${selected.unit}s` },
                { l:"Freshness", v:selected.fresh },
                { l:"Delivery",  v:"Cold chain ❄️" },
              ].map((d,i) => (
                <div key={i} style={{ background:C.bgCardLight, borderRadius:10, padding:10 }}>
                  <div style={{ color:C.textDim, fontSize:10, fontFamily:"sans-serif" }}>{d.l}</div>
                  <div style={{ color:C.text, fontSize:13, fontFamily:"sans-serif", fontWeight:"bold", marginTop:2 }}>{d.v}</div>
                </div>
              ))}
            </div>
            <Btn onClick={() => sendInterest(selected)}>Express Interest</Btn>
            <Btn variant="secondary" style={{ marginTop:8 }} onClick={() => { setSelected(null); setScreen("delivery"); }}>
              Book Cold Delivery
            </Btn>
          </div>
        </div>
      )}
    </div>
  );
};

// ── Delivery ───────────────────────────────────────────────────

const Delivery = () => {
  const [step, setStep] = useState(1);
  const [form, setForm] = useState({ pickupRegion:"", pickupTown:"", dest:"", produce:"", qty:"", notes:"" });
  const [trackId] = useState("MVR-" + (Math.floor(Math.random()*9000)+1000));

  const set = (k,v) => setForm(p => ({...p,[k]:v}));

  const StepDots = () => (
    <div style={{ padding:"14px 20px", display:"flex", alignItems:"center" }}>
      {["Pickup","Delivery","Produce","Confirm"].map((s,i) => (
        <div key={i} style={{ display:"flex", alignItems:"center", flex:1 }}>
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:3 }}>
            <div style={{
              width:26, height:26, borderRadius:"50%", fontSize:10, fontFamily:"sans-serif",
              display:"flex", alignItems:"center", justifyContent:"center", fontWeight:"bold",
              background: step>i+1 ? C.greenBright : step===i+1 ? C.greenBright+"30" : C.bgCard,
              color:       step>i+1 ? C.bg          : step===i+1 ? C.greenAccent      : C.textDim,
              border:`1.5px solid ${step>=i+1 ? C.greenBright : C.border}`,
            }}>{step>i+1?"✓":i+1}</div>
            <div style={{ color:step===i+1?C.greenAccent:C.textDim, fontSize:8, fontFamily:"sans-serif", whiteSpace:"nowrap" }}>{s}</div>
          </div>
          {i<3 && <div style={{ flex:1, height:1.5, background:step>i+1?C.greenBright+"60":C.border, marginBottom:14 }}/>}
        </div>
      ))}
    </div>
  );

  return (
    <div style={{ flex:1, overflowY:"auto", paddingBottom:16 }}>
      <div style={{ padding:"16px 20px 12px", borderBottom:`1px solid ${C.border}` }}>
        <div style={{ color:C.text, fontSize:20 }}>Book Cold Delivery</div>
        <div style={{ color:C.textMuted, fontSize:12, fontFamily:"sans-serif" }}>Solar-powered refrigerated tricycle</div>
      </div>
      <StepDots/>

      <div style={{ padding:"0 16px" }}>
        {step===1 && (
          <Card>
            <div style={{ color:C.greenAccent, fontSize:13, fontFamily:"sans-serif", fontWeight:"bold", marginBottom:16 }}>📍 Pickup Location</div>
            <div style={{ marginBottom:14 }}>
              <label style={labelStyle}>REGION</label>
              <select value={form.pickupRegion} onChange={e=>{set("pickupRegion",e.target.value);set("pickupTown","");}} style={inputStyle}>
                <option value="">Select region...</option>
                {REGIONS.map(r=><option key={r} value={r}>{r}</option>)}
              </select>
            </div>
            <div style={{ marginBottom:16 }}>
              <label style={labelStyle}>TOWN / AREA</label>
              <select value={form.pickupTown} onChange={e=>set("pickupTown",e.target.value)} style={{...inputStyle,opacity:form.pickupRegion?1:0.5}} disabled={!form.pickupRegion}>
                <option value="">Select town...</option>
                {(TOWNS[form.pickupRegion]||[]).map(t=><option key={t} value={t}>{t}</option>)}
              </select>
            </div>
            <Btn onClick={()=>setStep(2)} disabled={!form.pickupRegion||!form.pickupTown}>Next →</Btn>
          </Card>
        )}

        {step===2 && (
          <Card>
            <div style={{ color:C.greenAccent, fontSize:13, fontFamily:"sans-serif", fontWeight:"bold", marginBottom:16 }}>🏪 Delivery Destination</div>
            <div style={{ marginBottom:16 }}>
              <label style={labelStyle}>DELIVERY ADDRESS</label>
              <input value={form.dest} onChange={e=>set("dest",e.target.value)} placeholder="Market name, street, town..." style={inputStyle}/>
            </div>
            <div style={{ display:"flex", gap:10 }}>
              <Btn variant="secondary" style={{flex:1}} onClick={()=>setStep(1)}>← Back</Btn>
              <Btn style={{flex:1}} disabled={!form.dest} onClick={()=>setStep(3)}>Next →</Btn>
            </div>
          </Card>
        )}

        {step===3 && (
          <Card>
            <div style={{ color:C.greenAccent, fontSize:13, fontFamily:"sans-serif", fontWeight:"bold", marginBottom:16 }}>🌿 Produce Details</div>
            <div style={{ marginBottom:14 }}>
              <label style={labelStyle}>TYPE OF PRODUCE</label>
              <input value={form.produce} onChange={e=>set("produce",e.target.value)} placeholder="e.g. Tomatoes, Fish, Vaccines..." style={inputStyle}/>
            </div>
            <div style={{ marginBottom:14 }}>
              <label style={labelStyle}>QUANTITY</label>
              <input value={form.qty} onChange={e=>set("qty",e.target.value)} placeholder="e.g. 20 crates, 5 bags..." style={inputStyle}/>
            </div>
            <div style={{ marginBottom:16 }}>
              <label style={labelStyle}>NOTES (OPTIONAL)</label>
              <textarea value={form.notes} onChange={e=>set("notes",e.target.value)} placeholder="Special handling instructions..." style={{...inputStyle,height:70,resize:"none"}}/>
            </div>
            <div style={{ display:"flex", gap:10 }}>
              <Btn variant="secondary" style={{flex:1}} onClick={()=>setStep(2)}>← Back</Btn>
              <Btn style={{flex:1}} disabled={!form.produce||!form.qty} onClick={()=>setStep(4)}>Review →</Btn>
            </div>
          </Card>
        )}

        {step===4 && (
          <Card>
            <div style={{ color:C.greenAccent, fontSize:13, fontFamily:"sans-serif", fontWeight:"bold", marginBottom:16 }}>✅ Confirm Booking</div>
            {[
              { l:"Pickup",      v:`${form.pickupTown}, ${form.pickupRegion}` },
              { l:"Destination", v:form.dest },
              { l:"Produce",     v:form.produce },
              { l:"Quantity",    v:form.qty },
              { l:"Vehicle",     v:"Cold chain tricycle ❄️" },
              { l:"Est. cost",   v:"GHS 80 – 150 (confirmed on pickup)" },
            ].map((d,i) => (
              <div key={i} style={{
                display:"flex", justifyContent:"space-between",
                paddingBottom:10, marginBottom:10,
                borderBottom: i<5 ? `1px solid ${C.border}` : "none",
              }}>
                <span style={{ color:C.textMuted, fontSize:12, fontFamily:"sans-serif" }}>{d.l}</span>
                <span style={{ color:C.text, fontSize:12, fontFamily:"sans-serif", maxWidth:"60%", textAlign:"right" }}>{d.v}</span>
              </div>
            ))}
            <div style={{ background:C.gold+"15", border:`1px solid ${C.gold}40`, borderRadius:8, padding:10, marginBottom:16 }}>
              <div style={{ color:C.gold, fontSize:11, fontFamily:"sans-serif", lineHeight:1.5 }}>
                ❄️ Your goods will remain refrigerated throughout delivery via our solar-powered tricycle.
              </div>
            </div>
            <div style={{ display:"flex", gap:10 }}>
              <Btn variant="secondary" style={{flex:1}} onClick={()=>setStep(3)}>← Edit</Btn>
              <Btn style={{flex:2}} onClick={()=>setStep(5)}>Confirm Booking</Btn>
            </div>
          </Card>
        )}

        {step===5 && (
          <div>
            <div style={{
              background:C.greenBright+"15", border:`1px solid ${C.greenBright}40`,
              borderRadius:16, padding:20, textAlign:"center", marginBottom:14,
            }}>
              <div style={{ fontSize:52, marginBottom:8 }}>✅</div>
              <div style={{ color:C.text, fontSize:20, marginBottom:4 }}>Booking Confirmed!</div>
              <div style={{ color:C.textMuted, fontSize:12, fontFamily:"sans-serif" }}>A Moovers rider is being assigned</div>
            </div>

            <Card style={{ marginBottom:14, textAlign:"center" }}>
              <div style={{ color:C.textMuted, fontSize:10, fontFamily:"sans-serif", letterSpacing:1.5, marginBottom:6 }}>TRACKING ID</div>
              <div style={{ color:C.gold, fontSize:26, letterSpacing:3 }}>{trackId}</div>
            </Card>

            <Card style={{ marginBottom:14 }}>
              <div style={{ color:C.textMuted, fontSize:10, fontFamily:"sans-serif", letterSpacing:1.5, marginBottom:14 }}>LIVE STATUS</div>
              {[
                { label:"Request Received",       done:true,  time:"Just now" },
                { label:"Rider Assigned",          done:true,  time:"2 min ago" },
                { label:"En Route to Pickup",      done:false, time:"Est. 15–25 min" },
                { label:"Produce Loaded & Cooled", done:false, time:"Est. 40 min" },
                { label:"Out for Delivery",        done:false, time:"Est. 1 hr" },
                { label:"Delivered ✓",             done:false, time:"Est. 2–3 hrs" },
              ].map((s,i,arr) => (
                <div key={i} style={{ display:"flex", gap:12, alignItems:"flex-start" }}>
                  <div style={{ display:"flex", flexDirection:"column", alignItems:"center", flexShrink:0 }}>
                    <div style={{
                      width:22, height:22, borderRadius:"50%",
                      background: s.done ? C.greenBright : C.bgCardLight,
                      border:`2px solid ${s.done ? C.greenBright : C.textDim}`,
                      display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:10, color: s.done ? C.bg : C.textDim, fontWeight:"bold",
                    }}>{s.done?"✓":""}</div>
                    {i<arr.length-1 && <div style={{ width:2, height:20, background: s.done?C.greenBright+"50":C.border }}/>}
                  </div>
                  <div style={{ paddingTop:2 }}>
                    <div style={{ color:s.done?C.text:C.textDim, fontSize:13, fontFamily:"sans-serif" }}>{s.label}</div>
                    <div style={{ color:C.textDim, fontSize:10, fontFamily:"sans-serif", marginBottom:10 }}>{s.time}</div>
                  </div>
                </div>
              ))}
            </Card>

            <Btn variant="secondary" onClick={()=>{
              setStep(1);
              setForm({ pickupRegion:"", pickupTown:"", dest:"", produce:"", qty:"", notes:"" });
            }}>+ Book Another Delivery</Btn>
          </div>
        )}
      </div>
    </div>
  );
};

// ── Profile ────────────────────────────────────────────────────

const Profile = () => (
  <div style={{ flex:1, overflowY:"auto", paddingBottom:16 }}>
    <div style={{ padding:"16px 20px 12px", borderBottom:`1px solid ${C.border}` }}>
      <div style={{ color:C.text, fontSize:20 }}>My Account</div>
    </div>
    <div style={{ padding:16 }}>
      <Card style={{ textAlign:"center", marginBottom:16 }}>
        <div style={{
          width:64, height:64, borderRadius:"50%", background:C.green,
          display:"flex", alignItems:"center", justifyContent:"center",
          fontSize:28, margin:"0 auto 12px", border:`2px solid ${C.greenBright}`,
        }}>👤</div>
        <div style={{ color:C.text, fontSize:16 }}>Demo User</div>
        <div style={{ color:C.textMuted, fontSize:12, fontFamily:"sans-serif", marginTop:4 }}>Buyer · Bono East Region</div>
        <div style={{ marginTop:10 }}><Tag color={C.greenBright}>Verified ✓</Tag></div>
      </Card>

      <div style={{ color:C.textMuted, fontSize:10, letterSpacing:1.5, fontFamily:"sans-serif", marginBottom:10 }}>ACTIVE DELIVERY</div>
      <Card style={{ marginBottom:16 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
          <div>
            <div style={{ color:C.text, fontSize:14, fontFamily:"sans-serif", fontWeight:"bold" }}>MVR-7421</div>
            <div style={{ color:C.textMuted, fontSize:11, fontFamily:"sans-serif", marginTop:2 }}>Tomatoes · 10 crates</div>
            <div style={{ color:C.textMuted, fontSize:11, fontFamily:"sans-serif" }}>Techiman → Cape Coast</div>
          </div>
          <Tag color={C.greenBright}>In Transit</Tag>
        </div>
        <div style={{
          marginTop:12, background:C.bgCardLight, borderRadius:8,
          padding:10, display:"flex", alignItems:"center", gap:8,
        }}>
          <span style={{ fontSize:18 }}>❄️</span>
          <div>
            <div style={{ color:C.greenAccent, fontSize:11, fontFamily:"sans-serif", fontWeight:"bold" }}>Refrigeration Active</div>
            <div style={{ color:C.textMuted, fontSize:10, fontFamily:"sans-serif" }}>4°C · Solar powered</div>
          </div>
        </div>
      </Card>

      <div style={{ color:C.textMuted, fontSize:10, letterSpacing:1.5, fontFamily:"sans-serif", marginBottom:10 }}>PAST ORDERS</div>
      {[
        { id:"MVR-6830", item:"Garden Eggs · 5 bags",  route:"Winneba → Kasoa",     date:"28 May" },
        { id:"MVR-6591", item:"Pepper · 8 crates",     route:"Kintampo → Techiman", date:"22 May" },
      ].map((o,i) => (
        <Card key={i} style={{ marginBottom:10 }}>
          <div style={{ display:"flex", justifyContent:"space-between" }}>
            <div>
              <div style={{ color:C.text, fontSize:13, fontFamily:"sans-serif", fontWeight:"bold" }}>{o.id}</div>
              <div style={{ color:C.textMuted, fontSize:11, fontFamily:"sans-serif", marginTop:2 }}>{o.item}</div>
              <div style={{ color:C.textDim, fontSize:10, fontFamily:"sans-serif" }}>{o.route}</div>
            </div>
            <div style={{ textAlign:"right" }}>
              <Tag color={C.greenBright}>Delivered</Tag>
              <div style={{ color:C.textDim, fontSize:10, fontFamily:"sans-serif", marginTop:6 }}>{o.date}</div>
            </div>
          </div>
        </Card>
      ))}

      <div style={{
        marginTop:8, background:C.gold+"10", border:`1px solid ${C.gold}30`,
        borderRadius:10, padding:12, textAlign:"center",
      }}>
        <div style={{ color:C.gold, fontSize:11, fontFamily:"sans-serif" }}>Demo Version</div>
      </div>
    </div>
  </div>
);

// ── App ────────────────────────────────────────────────────────

const App = () => {
  const [started, setStarted] = useState(false);
  const [screen,  setScreen]  = useState("home");

  return (
    <div style={{
      background:C.bg, minHeight:"100vh",
      display:"flex", justifyContent:"center", alignItems:"flex-start",
      padding:"0",
    }}>
      <div style={{
        width:"100%", maxWidth:390, minHeight:"100vh",
        background:C.bg, display:"flex", flexDirection:"column",
      }}>
        {/* Status bar */}
        <div style={{ display:"flex", justifyContent:"space-between", padding:"12px 20px 4px", fontSize:11, color:C.textMuted, fontFamily:"sans-serif", flexShrink:0 }}>
          <span>9:41</span><span>●●● 100%</span>
        </div>

        {!started ? (
          <Landing onEnter={() => setStarted(true)}/>
        ) : (
          <>
            <div style={{ flex:1, overflow:"hidden", display:"flex", flexDirection:"column" }}>
              {screen==="home"     && <Home     setScreen={setScreen}/>}
              {screen==="market"   && <Market   setScreen={setScreen}/>}
              {screen==="delivery" && <Delivery/>}
              {screen==="profile"  && <Profile/>}
            </div>
            <BottomNav screen={screen} setScreen={setScreen}/>
          </>
        )}
      </div>
    </div>
  );
};

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
